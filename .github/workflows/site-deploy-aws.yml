name: 'Site: Deploy to AWS'

on:
  workflow_call:
    inputs:
      prez-lite-ref:
        description: 'prez-lite branch, tag, or commit'
        type: string
        default: 'main'
      deploy-mode:
        description: 'Deploy mode: full (build + deploy) or data-only (sync exports)'
        type: string
        default: 'full'
      aws-region:
        description: 'AWS region'
        type: string
        default: 'ap-southeast-2'
      s3-bucket:
        description: 'S3 bucket name for deployment'
        type: string
        required: true
      cloudfront-id:
        description: 'CloudFront distribution ID for cache invalidation (optional)'
        type: string
        default: ''
      node-version:
        description: 'Node.js version'
        type: string
        default: '22'
      vocab-source-dir:
        description: 'Directory containing vocabulary TTL files'
        type: string
        default: 'data/vocabs'
      background-dir:
        description: 'Directory containing background label TTL files'
        type: string
        default: 'data/background'
      config-dir:
        description: 'Directory containing profiles.ttl and other config'
        type: string
        default: 'data/config'
      validators-dir:
        description: 'Directory containing SHACL validation shapes'
        type: string
        default: 'data/validators'
    secrets:
      aws-role-arn:
        description: 'AWS IAM role ARN for OIDC authentication'
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy-full:
    if: inputs.deploy-mode == 'full'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch prez-lite tools
        id: tools
        uses: Kurrawong/prez-lite/.github/actions/fetch-prez-lite-tools@main
        with:
          prez-lite-ref: ${{ inputs.prez-lite-ref }}
          node-version: ${{ inputs.node-version }}

      - name: Process vocabularies
        run: |
          DP="${{ steps.tools.outputs.data-processing-dir }}"

          ARGS="--sourceDir ${{ inputs.vocab-source-dir }} --outputBase public/export/vocabs --systemDir public/export/system --pattern *.ttl"
          [ -f "${{ inputs.config-dir }}/profiles.ttl" ] && ARGS="$ARGS --profiles ${{ inputs.config-dir }}/profiles.ttl"
          [ -d "${{ inputs.background-dir }}" ] && ARGS="$ARGS --backgroundDir ${{ inputs.background-dir }}"
          [ -d "${{ inputs.validators-dir }}" ] && ARGS="$ARGS --validators ${{ inputs.validators-dir }}"

          node "$DP/scripts/process-vocab.js" $ARGS

      - name: Generate system metadata
        run: |
          DP="${{ steps.tools.outputs.data-processing-dir }}"
          mkdir -p public/export/system/vocabularies public/export/system/search

          ARGS="--sourceDir ${{ inputs.vocab-source-dir }} --output public/export/system/vocabularies/index.json"
          [ -d "${{ inputs.background-dir }}" ] && ARGS="$ARGS --backgroundDir ${{ inputs.background-dir }}"
          [ -d "${{ inputs.validators-dir }}" ] && ARGS="$ARGS --validators ${{ inputs.validators-dir }}"
          node "$DP/scripts/generate-vocab-metadata.js" $ARGS || echo "Vocab metadata skipped"

          if ls ${{ inputs.background-dir }}/*.ttl >/dev/null 2>&1; then
            node "$DP/scripts/generate-labels.js" \
              --backgroundDir ${{ inputs.background-dir }} \
              --output public/export/system/labels.json || echo "Labels skipped"
          fi

          node "$DP/scripts/generate-search-index.js" \
            --exportDir public/export \
            --output public/export/system/search \
            --vocabMetadata public/export/system/vocabularies/index.json || echo "Search index skipped"

          # Workspaces
          if [ -f "${{ inputs.config-dir }}/workspaces.ttl" ] && [ -f "$DP/scripts/generate-workspaces.js" ]; then
            node "$DP/scripts/generate-workspaces.js" \
              --source ${{ inputs.config-dir }}/workspaces.ttl \
              --output public/export/system/workspaces.json || echo "Workspaces skipped"
          fi

      - name: Setup pnpm cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm generate
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          NUXT_PUBLIC_GITHUB_CLIENT_ID: ${{ vars.GH_CLIENT_ID }}
          NUXT_PUBLIC_GITHUB_AUTH_WORKER_URL: ${{ vars.GH_AUTH_WORKER_URL }}
          NUXT_PUBLIC_GITHUB_REPO: ${{ vars.GH_REPO }}
          NUXT_PUBLIC_GITHUB_BRANCH: ${{ vars.GH_BRANCH }}
          NUXT_PUBLIC_GITHUB_VOCAB_PATH: ${{ vars.GH_VOCAB_PATH }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Deploy to S3
        run: |
          aws s3 sync .output/public/ "s3://${{ inputs.s3-bucket }}/" --delete --quiet
          echo "Deploy complete"

      - name: Invalidate CloudFront cache
        if: inputs.cloudfront-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ inputs.cloudfront-id }}" \
            --paths "/*"

  deploy-data-only:
    if: inputs.deploy-mode == 'data-only'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Sync exports to S3
        run: |
          aws s3 sync public/export/ "s3://${{ inputs.s3-bucket }}/export/" --delete --quiet
          echo "Export sync complete"

      - name: Invalidate CloudFront cache
        if: inputs.cloudfront-id != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ inputs.cloudfront-id }}" \
            --paths "/export/*"
