name: 'Site: Process Data'

on:
  workflow_call:
    inputs:
      prez-lite-ref:
        description: 'prez-lite branch, tag, or commit'
        type: string
        default: 'main'
      node-version:
        description: 'Node.js version'
        type: string
        default: '22'
      vocab-source-dir:
        description: 'Directory containing vocabulary TTL files'
        type: string
        default: 'data/vocabs'
      background-dir:
        description: 'Directory containing background label TTL files'
        type: string
        default: 'data/background'
      config-dir:
        description: 'Directory containing profiles.ttl and other config'
        type: string
        default: 'data/config'
      validators-dir:
        description: 'Directory containing SHACL validation shapes'
        type: string
        default: 'data/validators'
permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Fetch prez-lite tools
        id: tools
        uses: Kurrawong/prez-lite/.github/actions/fetch-prez-lite-tools@main
        with:
          prez-lite-ref: ${{ inputs.prez-lite-ref }}
          node-version: ${{ inputs.node-version }}

      - name: Detect changed vocabs
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
          else
            CHANGED=$(git diff --name-only HEAD~1 -- '${{ inputs.vocab-source-dir }}/*.ttl' || true)
            if [ -z "$CHANGED" ]; then
              echo "mode=none" >> "$GITHUB_OUTPUT"
            else
              echo "mode=incremental" >> "$GITHUB_OUTPUT"
              echo "files<<EOF" >> "$GITHUB_OUTPUT"
              echo "$CHANGED" >> "$GITHUB_OUTPUT"
              echo "EOF" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Full rebuild (manual dispatch)
        if: steps.changed.outputs.mode == 'full'
        run: |
          DP="${{ steps.tools.outputs.data-processing-dir }}"

          ARGS="--sourceDir ${{ inputs.vocab-source-dir }} --outputBase public/export/vocabs --systemDir public/export/system --pattern *.ttl"
          [ -f "${{ inputs.config-dir }}/profiles.ttl" ] && ARGS="$ARGS --profiles ${{ inputs.config-dir }}/profiles.ttl"
          [ -d "${{ inputs.background-dir }}" ] && ARGS="$ARGS --backgroundDir ${{ inputs.background-dir }}"
          [ -d "${{ inputs.validators-dir }}" ] && ARGS="$ARGS --validators ${{ inputs.validators-dir }}"

          node "$DP/scripts/process-vocab.js" $ARGS

      - name: Process changed vocabs (incremental)
        if: steps.changed.outputs.mode == 'incremental'
        run: |
          DP="${{ steps.tools.outputs.data-processing-dir }}"

          echo "${{ steps.changed.outputs.files }}" | while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Processing: $file"

            ARGS="--source $file --type vocab --outDir public/export/vocabs/$(basename "$file" .ttl)"
            [ -f "${{ inputs.config-dir }}/profiles.ttl" ] && ARGS="$ARGS --profiles ${{ inputs.config-dir }}/profiles.ttl"
            [ -d "${{ inputs.background-dir }}" ] && ARGS="$ARGS --backgroundDir ${{ inputs.background-dir }}"

            node "$DP/scripts/process-vocab.js" $ARGS
          done

      - name: Regenerate global assets
        if: steps.changed.outputs.mode != 'none'
        run: |
          DP="${{ steps.tools.outputs.data-processing-dir }}"
          mkdir -p public/export/system/vocabularies public/export/system/search

          # Vocabulary metadata
          ARGS="--sourceDir ${{ inputs.vocab-source-dir }} --output public/export/system/vocabularies/index.json"
          [ -d "${{ inputs.background-dir }}" ] && ARGS="$ARGS --backgroundDir ${{ inputs.background-dir }}"
          [ -d "${{ inputs.validators-dir }}" ] && ARGS="$ARGS --validators ${{ inputs.validators-dir }}"
          node "$DP/scripts/generate-vocab-metadata.js" $ARGS || echo "Vocab metadata skipped"

          # Labels
          if ls ${{ inputs.background-dir }}/*.ttl >/dev/null 2>&1; then
            node "$DP/scripts/generate-labels.js" \
              --backgroundDir ${{ inputs.background-dir }} \
              --output public/export/system/labels.json || echo "Labels skipped"
          fi

          # Search index
          node "$DP/scripts/generate-search-index.js" \
            --exportDir public/export \
            --output public/export/system/search \
            --vocabMetadata public/export/system/vocabularies/index.json || echo "Search index skipped"

          # Workspaces
          if [ -f "${{ inputs.config-dir }}/workspaces.ttl" ] && [ -f "$DP/scripts/generate-workspaces.js" ]; then
            node "$DP/scripts/generate-workspaces.js" \
              --source ${{ inputs.config-dir }}/workspaces.ttl \
              --output public/export/system/workspaces.json || echo "Workspaces skipped"
          fi

      - name: Commit updated exports
        if: steps.changed.outputs.mode != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/export/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update processed exports"
          git push
